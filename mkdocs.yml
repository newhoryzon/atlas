site_name: Atlas | NEW HORYZON
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - abbr
  - attr_list
  - pymdownx.snippets
  - md_in_html
  - tables
  - footnotes

plugins:
  - search
  - tags
  - git-revision-date-localized:
      type: timeago
      custom_format: "%d. %B %Y"
      timezone: Europe/Paris
      locale: fr
      enable_creation_date: true
  - git-committers:
      repository: newhoryzon/atlas
      branch: main
      token: !ENV MKDOCS_GIT_COMMITTERS_APIKEY

docs_dir: docs
nav:
  - Home: index.md
  - Dev:
      - Outils:
          - Lix: dev/outils/lix.md
          - Oh My ZSH: dev/outils/oh-my-zsh.md
          - Starship: dev/outils/starship.md
  - APIs: apis/apis.md
  - Blog: blog/blog.md